<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fokus26 — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; padding: 24px; }
    h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    p.sub { font-size: 13px; color: #888; margin-bottom: 24px; }
    #sessions { display: flex; flex-direction: column; gap: 10px; max-width: 800px; }
    .session-card {
      background: #fff; border-radius: 12px; border: 1px solid #e0ddd6;
      padding: 14px 18px; cursor: pointer; transition: border-color 0.15s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .session-card:hover { border-color: #1d4ed8; }
    .session-card .info p { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .session-card .info span { font-size: 12px; color: #888; }
    .session-card .badge { background: #dbeafe; color: #1d4ed8; font-size: 12px; padding: 3px 10px; border-radius: 20px; }
    #chat-view { display: none; max-width: 800px; margin-top: 20px; }
    #back-btn { font-size: 13px; color: #1d4ed8; background: none; border: none; cursor: pointer; margin-bottom: 16px; padding: 0; }
    #chat-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }
    .msg { display: flex; gap: 10px; margin-bottom: 12px; max-width: 88%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; margin-left: auto; }
    .msg-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; margin-top: 2px; }
    .msg.assistant .msg-av { background: #dbeafe; color: #1d4ed8; }
    .msg.user .msg-av { background: #f0f0ec; color: #555; }
    .bubble { padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
    .msg.assistant .bubble { background: #f5f5f0; border: 1px solid #e0ddd6; color: #1a1a1a; }
    .msg.user .bubble { background: #1d4ed8; color: #fff; }
    .bubble p { margin-bottom: 6px; }
    .bubble p:last-child { margin-bottom: 0; }
    .time { font-size: 11px; color: #aaa; margin-top: 4px; text-align: right; }
    #loading { color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Fokus26 — Admin</h1>
  <p class="sub">Alle Chat-Verläufe der Studierenden</p>
  <div id="loading">Lade Sitzungen...</div>
  <div id="sessions"></div>
  <div id="chat-view">
    <button id="back-btn">← Zurück zur Übersicht</button>
    <div id="chat-title"></div>
    <div id="chat-messages"></div>
  </div>

  <script>
    const sessionsDiv = document.getElementById('sessions');
    const chatView = document.getElementById('chat-view');
    const loadingDiv = document.getElementById('loading');

    function formatDate(iso) {
      return new Date(iso).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function formatText(text) {
      return text.split('\n').map(l => l.trim() ? `<p>${l}</p>` : '').join('');
    }

    async function loadSessions() {
      const res = await fetch('/api/sessions');
      const data = await res.json();
      loadingDiv.style.display = 'none';
      if (!data.length) { sessionsDiv.innerHTML = '<p style="color:#888;font-size:14px;">Noch keine Chats gespeichert.</p>'; return; }
      data.forEach((s, i) => {
        const card = document.createElement('div');
        card.className = 'session-card';
        card.innerHTML = `
          <div class="info">
            <p>Sitzung ${i + 1}</p>
            <span>${formatDate(s.started)}</span>
          </div>
          <span class="badge">${s.messages} Nachrichten</span>`;
        card.addEventListener('click', () => loadChat(s.session_id, i + 1));
        sessionsDiv.appendChild(card);
      });
    }

    async function loadChat(sessionId, num) {
      sessionsDiv.style.display = 'none';
      chatView.style.display = 'block';
      document.getElementById('chat-title').textContent = `Sitzung ${num}`;
      const messagesDiv = document.getElementById('chat-messages');
      messagesDiv.innerHTML = '<p style="color:#888;font-size:13px;">Lade...</p>';
      const res = await fetch(`/api/session?id=${sessionId}`);
      const data = await res.json();
      messagesDiv.innerHTML = '';
      data.forEach(row => {
        const msg = document.createElement('div');
        msg.className = `msg ${row.role}`;
        const av = document.createElement('div');
        av.className = 'msg-av';
        av.textContent = row.role === 'assistant' ? 'IG' : 'S';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = formatText(row.content);
        const time = document.createElement('div');
        time.className = 'time';
        time.textContent = formatDate(row.created_at);
        const wrapper = document.createElement('div');
        wrapper.style.maxWidth = '88%';
        wrapper.style.marginLeft = row.role === 'user' ? 'auto' : '0';
        wrapper.appendChild(msg);
        wrapper.appendChild(time);
        msg.appendChild(av);
        msg.appendChild(bubble);
        messagesDiv.appendChild(wrapper);
      });
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      chatView.style.display = 'none';
      sessionsDiv.style.display = 'flex';
    });

    loadSessions();
  </script>
</body>
</html>
